<!DOCTYPE html>
<html>
<head>
  <title>AI Multi-System</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    .topbar {
      display: flex;
      overflow-x: auto;
      background: rgba(0,0,0,0.4);
      padding: 10px;
      gap: 10px;
    }

    .tab {
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tab.active {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
    }

    .chat {
      padding: 20px;
      height: calc(100vh - 70px);
      display: flex;
      flex-direction: column;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
    }

    .msg {
      margin: 10px 0;
      padding: 12px;
      border-radius: 12px;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .msg img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
    }

    input {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="topbar" id="tabs"></div>

<div class="chat">
  <div id="chat"></div>
  <input id="input" placeholder="Speak as AI...">
  <button onclick="send()">Send</button>
  <button onclick="newAI()">+ New AI</button>
</div>

<script>
// --- DATA ---
let users = JSON.parse(localStorage.getItem("ai_users") || "{}");
let current = null;

// --- AVATAR GENERATOR ---
function getAvatar(name) {
  return "https://api.dicebear.com/7.x/bottts/svg?seed=" + name;
}

// --- CREATE NEW AI ---
function newAI() {
  let name = prompt("Enter AI name:");
  if (!name) return;

  if (!users[name]) {
    users[name] = { chat: [] };
    save();
    loadTabs();
    switchAI(name);
  }
}

// --- SWITCH AI ---
function switchAI(name) {
  current = name;
  renderChat();
  loadTabs();
}

// --- SAVE ---
function save() {
  localStorage.setItem("ai_users", JSON.stringify(users));
}

// --- TABS ---
function loadTabs() {
  tabs.innerHTML = "";

  Object.keys(users).forEach(name => {
    let div = document.createElement("div");
    div.className = "tab " + (name === current ? "active" : "");

    let img = document.createElement("img");
    img.src = getAvatar(name);
    img.className = "avatar";

    let span = document.createElement("span");
    span.innerText = name;

    div.appendChild(img);
    div.appendChild(span);

    div.onclick = () => switchAI(name);

    tabs.appendChild(div);
  });
}

// --- CHAT ---
function renderChat() {
  chat.innerHTML = "";
  if (!current) return;

  users[current].chat.forEach(msg => {
    createMessage(msg);
  });
}

function createMessage(text) {
  let div = document.createElement("div");
  div.className = "msg";

  let img = document.createElement("img");
  img.src = getAvatar(current);

  let content = document.createElement("div");
  div.appendChild(img);
  div.appendChild(content);

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  typeEffect(text, content);
}

// --- TYPING EFFECT ---
function typeEffect(text, el) {
  let i = 0;
  el.innerText = current + ": ";

  let interval = setInterval(() => {
    el.innerText += text[i];
    i++;
    if (i >= text.length) clearInterval(interval);
  }, 20);
}

// --- SEND ---
function send() {
  let text = input.value.trim();
  if (!text || !current) return;

  users[current].chat.push(text);
  save();

  createMessage(text);

  input.value = "";
}

// --- INIT ---
window.onload = () => {
  if (Object.keys(users).length === 0) {
    users["AI-1"] = { chat: [] };
  }

  current = Object.keys(users)[0];
  loadTabs();
  renderChat();
};
</script>

</body>
</html>
