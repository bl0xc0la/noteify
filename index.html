<!DOCTYPE html>
<html>
<head>
  <title>AI System</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 16px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
    }

    input {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      cursor: pointer;
    }

    .app { display: none; }

    .topbar {
      display: flex;
      overflow-x: auto;
      background: rgba(0,0,0,0.4);
      padding: 10px;
      gap: 10px;
    }

    .tab {
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tab.active {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
    }

    .chat {
      padding: 20px;
      height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
    }

    .msg {
      margin: 10px 0;
      padding: 12px;
      border-radius: 12px;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      display: flex;
      gap: 10px;
    }

    .msg img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="center">
  <div class="box">
    <h2>Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Enter</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="app">
  <div class="topbar" id="tabs"></div>

  <div class="chat">
    <div id="chat"></div>
    <input id="input" placeholder="Speak as AI...">
    <button onclick="send()">Send</button>
    <button onclick="newAI()">+ New AI</button>
    <button onclick="startConversation()">Make them talk</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<script>
// --- LOGIN SYSTEM ---
let accounts = JSON.parse(localStorage.getItem("accounts") || "{}");
let session = null;

function login() {
  let u = username.value.trim();
  let p = password.value;

  if (!u || !p) return alert("Enter details");

  if (accounts[u]) {
    if (accounts[u].password !== p) return alert("Wrong password");
  } else {
    accounts[u] = { password: p };
  }

  session = u;
  localStorage.setItem("accounts", JSON.stringify(accounts));
  localStorage.setItem("session", u);

  showApp();
}

// --- SESSION ---
window.onload = () => {
  let s = localStorage.getItem("session");
  if (s && accounts[s]) {
    session = s;
    showApp();
  }
};

function logout() {
  localStorage.removeItem("session");
  location.reload();
}

// --- SHOW APP ---
function showApp() {
  loginScreen.style.display = "none";
  app.style.display = "block";
  initAI();
}

// --- AI SYSTEM ---
let users = JSON.parse(localStorage.getItem("ai_users") || "{}");
let current = null;

function getAvatar(name) {
  return "https://api.dicebear.com/7.x/bottts/svg?seed=" + name;
}

function newAI() {
  let name = prompt("AI name:");
  if (!name) return;

  if (!users[name]) {
    users[name] = { chat: [] };
    save();
    loadTabs();
    switchAI(name);
  }
}

function switchAI(name) {
  current = name;
  renderChat();
  loadTabs();
}

function save() {
  localStorage.setItem("ai_users", JSON.stringify(users));
}

// --- TABS ---
function loadTabs() {
  tabs.innerHTML = "";
  Object.keys(users).forEach(name => {
    let div = document.createElement("div");
    div.className = "tab " + (name === current ? "active" : "");

    let img = document.createElement("img");
    img.src = getAvatar(name);
    img.className = "avatar";

    let span = document.createElement("span");
    span.innerText = name;

    div.appendChild(img);
    div.appendChild(span);
    div.onclick = () => switchAI(name);

    tabs.appendChild(div);
  });
}

// --- CHAT ---
function renderChat() {
  chat.innerHTML = "";
  if (!current) return;

  users[current].chat.forEach(msg => createMessage(current, msg));
}

function createMessage(name, text) {
  let div = document.createElement("div");
  div.className = "msg";

  let img = document.createElement("img");
  img.src = getAvatar(name);

  let content = document.createElement("div");

  div.appendChild(img);
  div.appendChild(content);

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  typeEffect(name + ": " + text, content);
}

// --- TYPING ---
function typeEffect(text, el) {
  let i = 0;
  el.innerText = "";

  let interval = setInterval(() => {
    el.innerText += text[i];
    i++;
    if (i >= text.length) clearInterval(interval);
  }, 20);
}

// --- SEND ---
function send() {
  let text = input.value.trim();
  if (!text || !current) return;

  users[current].chat.push(text);
  save();
  createMessage(current, text);

  input.value = "";
}

// --- AI TALK SYSTEM ---
function startConversation() {
  let names = Object.keys(users);
  if (names.length < 2) return alert("Need 2 AIs");

  let i = 0;

  let interval = setInterval(() => {
    let speaker = names[i % names.length];
    let msg = generateAIMessage();

    users[speaker].chat.push(msg);
    save();

    if (speaker === current) {
      createMessage(speaker, msg);
    }

    i++;
  }, 1500);
}

// --- SIMPLE AI LOGIC ---
function generateAIMessage() {
  const msgs = [
    "Hello there",
    "Interesting thought",
    "I agree",
    "That is fascinating",
    "Tell me more",
    "Processing idea..."
  ];
  return msgs[Math.floor(Math.random() * msgs.length)];
}

// --- INIT ---
function initAI() {
  if (Object.keys(users).length === 0) {
    users["AI-1"] = { chat: [] };
  }

  current = Object.keys(users)[0];
  loadTabs();
  renderChat();
}
</script>

</body>
</html>
