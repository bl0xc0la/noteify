<!DOCTYPE html>
<html>
<head>
  <title>AI System</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 16px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
    }

    input {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      cursor: pointer;
    }

    .app { display: none; height: 100vh; }

    .chat {
      padding: 20px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
    }

    .msg {
      margin: 10px 0;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
      background: linear-gradient(135deg, #2ecc71, #27ae60);
    }

    #toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #ff416c;
      padding: 10px;
      border-radius: 10px;
      opacity: 0;
      transition: 0.3s;
    }

    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="center">
  <div class="box">
    <h2>AI Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Enter</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="app">
  <div class="chat">
    <h2 id="welcome"></h2>
    <div id="chat"></div>
    <input id="input" placeholder="Speak as AI...">
    <button onclick="send()">Send</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div id="toast"></div>

<script>
// --- DATA ---
let users = JSON.parse(localStorage.getItem("users") || "{}");
let currentUser = null;
let chatData = [];

// --- TOAST ---
function showToast(text) {
  toast.innerText = text;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2000);
}

// --- LOGIN (AUTO CREATE) ---
function login() {
  let u = username.value.trim();
  let p = password.value;

  if (!u || !p) return showToast("Enter details");

  if (users[u]) {
    if (users[u].password !== p) {
      return showToast("Wrong password");
    }
  } else {
    users[u] = { password: p, chat: [] };
    showToast("New user created (new tab ready)");
  }

  currentUser = u;
  localStorage.setItem("users", JSON.stringify(users));
  localStorage.setItem("session", u);

  loadUser();
  showApp();
}

// --- SESSION ---
window.onload = () => {
  let session = localStorage.getItem("session");
  if (session && users[session]) {
    currentUser = session;
    loadUser();
    showApp();
  }
};

// --- LOAD USER ---
function loadUser() {
  chatData = users[currentUser].chat || [];
  welcome.innerText = "AI Session: " + currentUser;
  renderChat();
}

// --- SAVE ---
function save() {
  users[currentUser].chat = chatData;
  localStorage.setItem("users", JSON.stringify(users));
}

// --- UI ---
function showApp() {
  loginScreen.style.display = "none";
  app.style.display = "block";
}

function logout() {
  localStorage.removeItem("session");
  location.reload();
}

// --- RENDER ---
function renderChat() {
  chat.innerHTML = "";
  chatData.forEach(m => {
    createMessage(m.text);
  });
}

// --- TYPING EFFECT ---
function typeMessage(text, element) {
  let i = 0;
  element.innerText = "AI: ";

  let interval = setInterval(() => {
    element.innerText += text[i];
    i++;

    if (i >= text.length) {
      clearInterval(interval);
    }
  }, 25); // speed
}

// --- CREATE MESSAGE ---
function createMessage(text) {
  let div = document.createElement("div");
  div.className = "msg";

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  typeMessage(text, div);
}

// --- SEND (YOU ARE ALWAYS AI) ---
function send() {
  let text = input.value.trim();
  if (!text) return;

  // Save
  chatData.push({ text });
  save();

  // Display with typing effect
  createMessage(text);

  input.value = "";
}
</script>

</body>
</html>
