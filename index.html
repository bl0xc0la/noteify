<!DOCTYPE html>
<html>
<head>
  <title>AI Chat System</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 16px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
    }

    input {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      cursor: pointer;
    }

    .app { display: none; height: 100vh; }

    .chat {
      padding: 20px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
    }

    .msg {
      margin: 10px 0;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    }

    .user {
      background: linear-gradient(135deg, #1e90ff, #0066ff);
    }

    .ai {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
    }

    #toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #ff416c;
      padding: 10px;
      border-radius: 10px;
      opacity: 0;
      transition: 0.3s;
    }

    #toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="center">
  <div class="box">
    <h2>Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="app">
  <div class="chat">
    <h2>AI Chat</h2>
    <div id="chat"></div>
    <input id="input" placeholder="Type message or /ai">
    <button onclick="send()">Send</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div id="toast"></div>

<script>
// --- CONFIG ---
const USERNAME = "BloxColaYT";
const PASSWORD = "Ilikechips!1";

// --- STATE ---
let chatData = JSON.parse(localStorage.getItem("chat") || "[]");
let mode = "normal";

// --- SOUNDS ---
const sendSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
const aiSound = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");

// --- TOAST ---
function showToast(text) {
  toast.innerText = text;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2000);
}

// --- LOGIN ---
function login() {
  if (username.value === USERNAME && password.value === PASSWORD) {
    localStorage.setItem("session", "true");
    showApp();
  } else {
    showToast("Wrong login");
  }
}

function logout() {
  localStorage.removeItem("session");
  location.reload();
}

window.onload = () => {
  if (localStorage.getItem("session")) showApp();
  renderChat();
};

function showApp() {
  loginScreen.style.display = "none";
  app.style.display = "block";
}

// --- CHAT ---
function addMessage(text, type) {
  chatData.push({ text, type });
  localStorage.setItem("chat", JSON.stringify(chatData));
  renderChat();
}

function renderChat() {
  chat.innerHTML = "";
  chatData.forEach(m => {
    let div = document.createElement("div");
    div.className = "msg " + m.type;
    div.innerText = m.text;
    chat.appendChild(div);
  });
  chat.scrollTop = chat.scrollHeight;
}

// --- AI ---
function AI(input) {
  return "AI: " + input;
}

// --- SEND ---
function send() {
  let text = input.value;
  if (!text) return;

  // Commands
  if (text === "/ai") {
    mode = "ai";
    showToast("You are now AI");
    input.value = "";
    return;
  }

  if (text === "/user") {
    mode = "normal";
    showToast("Back to user mode");
    input.value = "";
    return;
  }

  // USER MESSAGE
  if (mode === "normal") {
    addMessage(text, "user");
    sendSound.play();

    let reply = AI(text);
    addMessage(reply, "ai");
    aiSound.play();
  }

  // YOU ARE AI MODE
  else if (mode === "ai") {
    addMessage("AI: " + text, "ai");
    aiSound.play();
  }

  input.value = "";
}
</script>

</body>
</html>
