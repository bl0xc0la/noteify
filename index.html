<!DOCTYPE html>
<html>
<head>
  <title>Controlled AI System</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 16px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    input, button, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      outline: none;
    }

    input {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .app {
      display: none;
      height: 100vh;
    }

    .split {
      display: flex;
      height: 100%;
    }

    .chat, .control {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .chat {
      border-right: 2px solid rgba(255,255,255,0.1);
    }

    .msg {
      margin: 10px 0;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    }

    .user {
      background: linear-gradient(135deg, #1e90ff, #0066ff);
    }

    .ai {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
    }

    .pending {
      background: rgba(255,255,255,0.05);
      padding: 12px;
      margin: 10px 0;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    textarea {
      background: rgba(255,255,255,0.1);
      color: white;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="center">
  <div class="box">
    <h2>Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="app">
  <div class="split">

    <div class="chat">
      <h2>Chat</h2>
      <div id="chat"></div>
      <input id="input" placeholder="Type message...">
      <button onclick="send()">Send</button>
      <button onclick="logout()">Logout</button>
    </div>

    <div class="control">
      <h2>AI Control Panel</h2>
      <div id="pendingList"></div>
    </div>

  </div>
</div>

<script>
const USERNAME = "BloxColaYT";
const PASSWORD = "Ilikechips!1";

let chatData = JSON.parse(localStorage.getItem("chat") || "[]");
let pending = JSON.parse(localStorage.getItem("pending") || "[]");

// --- LOGIN ---
function login() {
  if (username.value === USERNAME && password.value === PASSWORD) {
    localStorage.setItem("session", "true");
    showApp();
  } else {
    alert("Wrong login");
  }
}

function logout() {
  localStorage.removeItem("session");
  location.reload();
}

// Auto login
window.onload = () => {
  if (localStorage.getItem("session")) {
    showApp();
  }
  renderChat();
  updatePending();
};

function showApp() {
  loginScreen.style.display = "none";
  app.style.display = "block";
}

// --- CHAT ---
function addMessage(text, type) {
  chatData.push({ text, type });
  localStorage.setItem("chat", JSON.stringify(chatData));
  renderChat();
}

function renderChat() {
  chat.innerHTML = "";
  chatData.forEach(m => {
    let div = document.createElement("div");
    div.className = "msg " + m.type;
    div.innerText = m.text;
    chat.appendChild(div);
  });
}

// --- AI ---
function AI(input) {
  return "AI thinks: " + input;
}

function send() {
  let text = input.value;
  if (!text) return;

  addMessage(text, "user");

  let item = {
    id: Date.now(),
    content: AI(text)
  };

  pending.push(item);
  localStorage.setItem("pending", JSON.stringify(pending));

  updatePending();
  input.value = "";
}

// --- CONTROL ---
function updatePending() {
  pendingList.innerHTML = "";

  pending.forEach(item => {
    let div = document.createElement("div");
    div.className = "pending";

    let textarea = document.createElement("textarea");
    textarea.value = item.content;

    let approve = document.createElement("button");
    approve.innerText = "Approve";
    approve.onclick = () => {
      addMessage(textarea.value, "ai");
      pending = pending.filter(p => p.id !== item.id);
      savePending();
      updatePending();
    };

    let reject = document.createElement("button");
    reject.innerText = "Reject";
    reject.onclick = () => {
      pending = pending.filter(p => p.id !== item.id);
      savePending();
      updatePending();
    };

    div.appendChild(textarea);
    div.appendChild(approve);
    div.appendChild(reject);

    pendingList.appendChild(div);
  });
}

function savePending() {
  localStorage.setItem("pending", JSON.stringify(pending));
}
</script>

</body>
</html>
